<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Number Processor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                        'bounce-short': 'bounceShort 0.5s ease-in-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        bounceShort: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.2)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.8);
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 1);
        }
        .copy-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .copy-btn:active {
            transform: scale(0.95);
        }
        .notification {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .notification.show {
            transform: translateX(0);
        }
        .number-item {
            transition: all 0.3s ease;
        }
        .number-item:hover {
            transform: translateX(4px);
            background: rgba(51, 65, 85, 0.8);
        }
    </style>
</head>
<body class="text-slate-200 p-4 md:p-8">

    <!-- Notification Container -->
    <div id="notificationContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8 animate-fade-in">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-600 mb-4 shadow-lg shadow-cyan-500/25">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                </svg>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-400 bg-clip-text text-transparent mb-2">
                Phone Number Processor
            </h1>
            <p class="text-slate-400">Proses daftar nomor telepon dengan format otomatis</p>
        </header>

        <div class="grid lg:grid-cols-2 gap-6">
            <!-- Input Section -->
            <div class="glass-card rounded-2xl p-6 animate-slide-up" style="animation-delay: 0.1s">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                        </svg>
                        Input
                    </h2>
                    <span class="text-xs text-slate-500 bg-slate-800 px-2 py-1 rounded-full">Upload atau Paste</span>
                </div>

                <!-- File Upload -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-400 mb-2">Upload File (.txt)</label>
                    <div class="relative group">
                        <input type="file" id="fileInput" accept=".txt" class="hidden">
                        <label for="fileInput" 
                            class="flex items-center justify-center w-full h-24 border-2 border-dashed border-slate-600 rounded-xl cursor-pointer hover:border-cyan-500 hover:bg-slate-800/50 transition-all duration-300 group-hover:shadow-lg group-hover:shadow-cyan-500/10">
                            <div class="text-center">
                                <svg class="mx-auto h-8 w-8 text-slate-400 group-hover:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                                <span class="mt-2 text-sm text-slate-400 group-hover:text-slate-300">Klik untuk upload file .txt</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="relative mb-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-700"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-slate-800 text-slate-500 rounded">ATAU</span>
                    </div>
                </div>

                <!-- Text Input -->
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Paste Nomor (1 per baris)</label>
                    <textarea id="manualInput" 
                        class="w-full h-40 bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-slate-300 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition-all resize-none custom-scrollbar"
                        placeholder="Contoh:&#10;081234567890&#10;082345678901&#10;..."></textarea>
                </div>

                <button onclick="processInput()" 
                    class="mt-4 w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-medium py-3 px-4 rounded-xl transition-all duration-300 transform hover:scale-[1.02] hover:shadow-lg hover:shadow-cyan-500/25 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Proses Nomor
                </button>
            </div>

            <!-- Output Section -->
            <div class="glass-card rounded-2xl p-6 animate-slide-up" style="animation-delay: 0.2s">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-semibold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
                        </svg>
                        Hasil
                    </h2>
                    
                    <!-- Stats -->
                    <div id="statsContainer" class="hidden">
                        <span class="text-xs text-slate-400 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                            Total: <span id="totalCount" class="text-emerald-400 font-bold">0</span> nomor
                        </span>
                    </div>
                </div>

                <!-- Bulk Output Textarea -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-400 mb-2">Semua Nomor (Copy)</label>
                    <div class="relative">
                        <textarea id="bulkOutput" readonly
                            class="w-full h-32 bg-slate-900/80 border border-slate-700 rounded-xl p-4 text-slate-300 custom-scrollbar font-mono text-sm"></textarea>
                        <button onclick="copyAll()" 
                            class="absolute top-2 right-2 p-2 bg-slate-700 hover:bg-cyan-600 rounded-lg transition-all duration-200 group"
                            title="Copy All">
                            <svg class="w-4 h-4 text-slate-300 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Individual List -->
                <div class="flex-1">
                    <label class="block text-sm font-medium text-slate-400 mb-2">List Nomor (Individual Copy)</label>
                    <div id="numberList" class="h-64 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                        <div class="text-center text-slate-600 py-12">
                            <svg class="mx-auto h-12 w-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                            </svg>
                            <p class="text-sm">Belum ada nomor yang diproses</p>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="grid grid-cols-3 gap-3 mt-4">
                    <button onclick="copyAll()" 
                        class="flex items-center justify-center gap-2 bg-slate-700 hover:bg-cyan-600 text-white py-2 px-4 rounded-lg transition-all duration-200 text-sm font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                        </svg>
                        Copy All
                    </button>
                    <button onclick="downloadTxt()" 
                        class="flex items-center justify-center gap-2 bg-slate-700 hover:bg-emerald-600 text-white py-2 px-4 rounded-lg transition-all duration-200 text-sm font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        Download
                    </button>
                    <button onclick="resetAll()" 
                        class="flex items-center justify-center gap-2 bg-slate-700 hover:bg-red-600 text-white py-2 px-4 rounded-lg transition-all duration-200 text-sm font-medium">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                        </svg>
                        Reset
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let processedNumbers = [];

        // File Upload Handler
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                document.getElementById('manualInput').value = content;
                showNotification('File berhasil diproses!', 'success');
                processInput();
            };
            reader.onerror = function() {
                showNotification('Gagal membaca file!', 'error');
            };
            reader.readAsText(file);
        });

        // Process Input Function
        function processInput() {
            const input = document.getElementById('manualInput').value;
            
            if (!input.trim()) {
                showNotification('Masukkan nomor terlebih dahulu!', 'warning');
                return;
            }

            // Split by lines and process
            const lines = input.split('\n');
            processedNumbers = [];

            lines.forEach(line => {
                const trimmed = line.trim();
                // Check if line contains any digit
                if (trimmed && /\d/.test(trimmed)) {
                    // Add + prefix if not exists
                    const formatted = trimmed.startsWith('+') ? trimmed : '+' + trimmed;
                    processedNumbers.push(formatted);
                }
            });

            if (processedNumbers.length === 0) {
                showNotification('Tidak ada nomor valid yang ditemukan!', 'warning');
                return;
            }

            updateUI();
            showNotification(`Berhasil memproses ${processedNumbers.length} nomor!`, 'success');
        }

        // Update UI
        function updateUI() {
            // Update stats
            document.getElementById('totalCount').textContent = processedNumbers.length;
            document.getElementById('statsContainer').classList.remove('hidden');

            // Update bulk output
            document.getElementById('bulkOutput').value = processedNumbers.join('\n');

            // Update list
            const listContainer = document.getElementById('numberList');
            listContainer.innerHTML = '';

            processedNumbers.forEach((number, index) => {
                const item = document.createElement('div');
                item.className = 'number-item flex items-center justify-between bg-slate-800/50 border border-slate-700 rounded-lg p-3 group';
                item.style.animationDelay = `${index * 0.05}s`;
                
                item.innerHTML = `
                    <span class="font-mono text-slate-300 text-sm md:text-base truncate mr-4">${number}</span>
                    <button onclick="copySingle('${number}', this)" 
                        class="copy-btn flex-shrink-0 p-2 rounded-lg bg-slate-700 hover:bg-cyan-600 text-slate-400 hover:text-white transition-all duration-200"
                        title="Copy nomor">
                        <svg class="copy-icon w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                        <svg class="check-icon w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </button>
                `;
                
                listContainer.appendChild(item);
            });
        }

        // Copy Single Number
        async function copySingle(number, btn) {
            try {
                await navigator.clipboard.writeText(number);
                
                // Visual feedback
                const copyIcon = btn.querySelector('.copy-icon');
                const checkIcon = btn.querySelector('.check-icon');
                
                copyIcon.classList.add('hidden');
                checkIcon.classList.remove('hidden');
                btn.classList.add('bg-emerald-600', 'text-white');
                btn.classList.remove('bg-slate-700', 'text-slate-400');
                
                showNotification('Berhasil disalin!', 'success');
                
                // Reset after 2 seconds
                setTimeout(() => {
                    copyIcon.classList.remove('hidden');
                    checkIcon.classList.add('hidden');
                    btn.classList.remove('bg-emerald-600', 'text-white');
                    btn.classList.add('bg-slate-700', 'text-slate-400');
                }, 2000);
                
            } catch (err) {
                showNotification('Gagal menyalin!', 'error');
            }
        }

        // Copy All
        async function copyAll() {
            if (processedNumbers.length === 0) {
                showNotification('Tidak ada data untuk disalin!', 'warning');
                return;
            }

            const text = document.getElementById('bulkOutput').value;
            try {
                await navigator.clipboard.writeText(text);
                showNotification('Semua nomor berhasil disalin!', 'success');
            } catch (err) {
                showNotification('Gagal menyalin!', 'error');
            }
        }

        // Download TXT
        function downloadTxt() {
            if (processedNumbers.length === 0) {
                showNotification('Tidak ada data untuk didownload!', 'warning');
                return;
            }

            const text = processedNumbers.join('\n');
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `phone_numbers_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showNotification('File berhasil didownload!', 'success');
        }

        // Reset All
        function resetAll() {
            processedNumbers = [];
            document.getElementById('manualInput').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('bulkOutput').value = '';
            document.getElementById('statsContainer').classList.add('hidden');
            
            const listContainer = document.getElementById('numberList');
            listContainer.innerHTML = `
                <div class="text-center text-slate-600 py-12">
                    <svg class="mx-auto h-12 w-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    <p class="text-sm">Belum ada nomor yang diproses</p>
                </div>
            `;
            
            showNotification('Semua data telah direset!', 'info');
        }

        // Notification System
        function showNotification(message, type = 'info') {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            
            const colors = {
                success: 'bg-emerald-500/90 border-emerald-400',
                error: 'bg-red-500/90 border-red-400',
                warning: 'bg-amber-500/90 border-amber-400',
                info: 'bg-blue-500/90 border-blue-400'
            };

            const icons = {
                success: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>',
                error: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>',
                warning: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>',
                info: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'
            };
            
            notification.className = `notification pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl border backdrop-blur-md shadow-lg text-white ${colors[type]}`;
            notification.innerHTML = `
                ${icons[type]}
                <span class="font-medium text-sm">${message}</span>
            `;
            
            container.appendChild(notification);
            
            // Trigger animation
            requestAnimationFrame(() => {
                notification.classList.add('show');
            });
            
            // Remove after 3 seconds
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    container.removeChild(notification);
                }, 400);
            }, 3000);
        }

        // Drag and drop support
        const dropZone = document.querySelector('label[for="fileInput"]');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, highlight, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, unhighlight, false);
        });

        function highlight(e) {
            dropZone.classList.add('border-cyan-500', 'bg-slate-800');
        }

        function unhighlight(e) {
            dropZone.classList.remove('border-cyan-500', 'bg-slate-800');
        }

        dropZone.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            
            if (files.length > 0 && files[0].name.endsWith('.txt')) {
                document.getElementById('fileInput').files = files;
                const event = new Event('change');
                document.getElementById('fileInput').dispatchEvent(event);
            } else {
                showNotification('Hanya file .txt yang diizinkan!', 'warning');
            }
        }
    </script>
</body>
</html>
