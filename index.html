<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Pengirim Email</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6 flex items-center justify-center">

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-blue-500">
            <h2 class="text-xl font-bold mb-4 border-b pb-2 text-gray-800">Panel Admin: Atur Pengirim</h2>
            
            <form id="adminForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Email Pengirim</label>
                    <input type="email" class="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="contoh@gmail.com" required>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Sandi Aplikasi (App Password)</label>
                    <input type="password" class="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="xxxx xxxx xxxx xxxx" required>
                    <p class="text-xs text-gray-500 mt-1">Gunakan sandi aplikasi dari pengaturan keamanan email Anda, bukan sandi utama.</p>
                </div>
                
                <button type="submit" class="w-full bg-blue-600 text-white font-bold p-2.5 rounded-md hover:bg-blue-700 transition duration-300">
                    Simpan Pengaturan
                </button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-green-500">
            <h2 class="text-xl font-bold mb-4 border-b pb-2 text-gray-800">Kirim Email ke Support</h2>
            
            <form id="emailForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Tujuan</label>
                    <input type="email" class="w-full border border-gray-300 rounded-md p-2.5 bg-gray-100 cursor-not-allowed text-gray-600 font-medium" value="support@support.whatsapp.com" readonly>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Subjek Pesan</label>
                    <input type="text" class="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-green-500 outline-none" placeholder="Masukkan subjek keluhan/bantuan..." required>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Isi Pesan</label>
                    <textarea class="w-full border border-gray-300 rounded-md p-2.5 focus:ring-2 focus:ring-green-500 outline-none h-32 resize-none" placeholder="Tuliskan detail pesan Anda di sini..." required></textarea>
                </div>
                
                <button type="submit" class="w-full bg-green-600 text-white font-bold p-2.5 rounded-md hover:bg-green-700 transition duration-300">
                    Kirim Pesan Sekarang
                </button>
            </form>
        </div>

    </div>
    <script>
        // Variabel untuk menyimpan pengaturan admin sementara
        let savedEmail = '';
        let savedPassword = '';

        // Mengambil elemen formulir
        const adminForm = document.getElementById('adminForm');
        const emailForm = document.getElementById('emailForm');

        // Logika saat Panel Admin disimpan
        adminForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah halaman refresh
            
            // Menyimpan nilai dari input admin
            savedEmail = adminForm.querySelector('input[type="email"]').value;
            savedPassword = adminForm.querySelector('input[type="password"]').value;
            
            alert('Pengaturan Admin berhasil disimpan! Anda sekarang bisa mengirim pesan.');
        });

        // Logika saat Formulir Kirim Email ditekan
        emailForm.addEventListener('submit', async function(e) {
            e.preventDefault(); // Mencegah halaman refresh

            // Pengecekan: Pastikan panel admin sudah diisi terlebih dahulu
            if (!savedEmail || !savedPassword) {
                alert('Tolong isi dan simpan pengaturan di Panel Admin terlebih dahulu!');
                return;
            }

            // Mengambil nilai subjek dan pesan
            const subject = emailForm.querySelector('input[type="text"]').value;
            const message = emailForm.querySelector('textarea').value;
            
            // Memberikan efek visual bahwa pesan sedang dikirim
            const submitBtn = emailForm.querySelector('button');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Mengirim...';
            submitBtn.disabled = true;

            try {
                // Mengirim data ke server Node.js kita
                const response = await fetch('http://elgaaa.github.io/fix/main.js/api/send-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        senderEmail: savedEmail,
                        appPassword: savedPassword,
                        subject: subject,
                        message: message
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert(result.message);
                    emailForm.reset(); // Mengosongkan formulir setelah berhasil
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                alert('Tidak dapat terhubung ke server. Pastikan server Node.js sudah berjalan!');
            } finally {
                // Mengembalikan tombol seperti semula
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
